version: '3.8'

services:
  islamic-app:
    build: .
    container_name: islamic-quran-azkar-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - islamic-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: islamic-app-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - islamic-app
    restart: unless-stopped
    networks:
      - islamic-network
    profiles:
      - production

networks:
  islamic-network:
    driver: bridge
